<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analytics Agent Dashboard</title>
  <script src="https://unpkg.com/amazon-quicksight-embedding-sdk@^1.0.0/dist/quicksight-embedding-js-sdk.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 1rem; }
    #qsContainer { width: 100%; height: 600px; border: 1px solid #ccc; }
    #agentResults { white-space: pre-wrap; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Analytics Agent Dashboard</h1>

  <h2>QuickSight Q</h2>
  <div id="qsContainer"></div>

  <h2>Developer Query</h2>
  <textarea id="prompt" rows="3" cols="60" placeholder="Ask a question..."></textarea><br>
  <button id="runBtn">Run</button>
  <div id="agentResults"></div>

  <script>
    // placeholder function: obtain an embedding URL/token from your backend
    async function getEmbeddingUrl() {
      const resp = await fetch('/get-q-embed-url');
      const data = await resp.json();
      return data.url; // expected to include session/host
    }

    // initialize QuickSight embedding
    async function initQS() {
      const url = await getEmbeddingUrl();
      const containerDiv = document.getElementById('qsContainer');
      const options = {
        url,
        container: containerDiv,
        scrolling: 'no',
        height: '600px',
      };
      window.quicksightEmbedding.embedDashboard(options);
    }

    document.getElementById('runBtn').addEventListener('click', async () => {
      const q = document.getElementById('prompt').value;
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
      });
      const data = await res.json();
      document.getElementById('agentResults').textContent = JSON.stringify(data, null, 2);
    });

    initQS().catch(console.error);
  </script>
</body>
</html>
